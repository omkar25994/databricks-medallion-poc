name: Databricks CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Databricks CLI
      run: pip install databricks-cli

    - name: Set Databricks Environment
      run: |
        echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
        echo "DATABRICKS_TOKEN=${{ secrets.DATABRICKS_TOKEN }}" >> $GITHUB_ENV

    # ✅ THIS IS THE MAGIC FIX
    - name: Update Databricks Repo ✅
      run: |
        databricks repos update \
        --path "/Repos/om1821@gmail.com/databricks-medallion-poc" \
        --branch main

    # ✅ Run Pipeline Job
    - name: Run Medallion Job ✅
      run: |
        databricks jobs run-now --job-id 278251268968840
